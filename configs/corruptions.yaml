# Manual corruption benchmark levels. Select one level manually for each evaluation.
severity_levels: [1, 2, 3]

corruptions:
  darkness:
    levels:
      1: {factor: 0.75}
      2: {factor: 0.55}
      3: {factor: 0.35}
  brightness:
    levels:
      1: {factor: 1.25}
      2: {factor: 1.60}
      3: {factor: 2.00}
  gaussian_blur:
    levels:
      1: {kernel_size: 3, sigma: 0.7}
      2: {kernel_size: 5, sigma: 1.2}
      3: {kernel_size: 9, sigma: 2.0}
  gaussian_noise:
    levels:
      1: {sigma: 5.0}
      2: {sigma: 10.0}
      3: {sigma: 20.0}
  jpeg_compression:
    levels:
      1: {quality: 70}
      2: {quality: 40}
      3: {quality: 15}
  fog:
    levels:
      1: {alpha: 0.15}
      2: {alpha: 0.30}
      3: {alpha: 0.45}
