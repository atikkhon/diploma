# Manual corruption benchmark levels. Select one level manually for each evaluation.
severity_levels: [1, 2, 3]

corruptions:
  darkness:
    levels:
      1: {factor: 0.75}
      2: {factor: 0.55}
      3: {factor: 0.35}
  brightness:
    levels:
      1: {factor: 1.15}
      2: {factor: 1.35}
      3: {factor: 1.60}
  gaussian_blur:
    levels:
      1: {kernel_size: 5, sigma: 1.0}
      2: {kernel_size: 9, sigma: 2.0}
      3: {kernel_size: 13, sigma: 3.0}
  gaussian_noise:
    levels:
      1: {sigma: 8.0}
      2: {sigma: 16.0}
      3: {sigma: 28.0}
  jpeg_compression:
    levels:
      1: {quality: 70}
      2: {quality: 40}
      3: {quality: 15}
  fog:
    levels:
      1: {alpha: 0.15}
      2: {alpha: 0.30}
      3: {alpha: 0.45}
