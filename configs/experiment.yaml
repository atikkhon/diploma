# Reproducibility
seed: 42

# Dataset paths must point to the extracted Cityscapes directories.
data:
  root: data/cityscapes
  train_images: leftImg8bit/train
  train_masks: gtFine/train
  official_val_images: leftImg8bit/val
  official_val_masks: gtFine/val
  split_file: data/splits/split_manifest.csv
  internal_val_size: 0.2
  num_classes: 19
  ignore_index: 255
  image_width: 384
  image_height: 192

run:
  name: unet_example
  output_dir: runs/unet_example
  model_dir: models/unet_example

model:
  name: unet
  encoder_name: resnet34
  encoder_weights: imagenet

training:
  epochs: 8
  batch_size: 8
  num_workers: 2
  log_interval: 25
  learning_rate: 0.0003
  weight_decay: 0.0001
  device: auto
  mixed_precision: true

evaluation:
  batch_size: 8
  save_predictions: true

tracking:
  # Set MLFLOW_TRACKING_URI in the environment when a custom URI is needed.
  experiment_name: cityscapes_segmentation

corruptions:
  darkness:
    levels:
      1: {factor: 0.75}
      2: {factor: 0.55}
      3: {factor: 0.35}
  brightness:
    levels:
      1: {factor: 1.15}
      2: {factor: 1.35}
      3: {factor: 1.60}
  gaussian_blur:
    levels:
      1: {kernel_size: 5, sigma: 1.0}
      2: {kernel_size: 9, sigma: 2.0}
      3: {kernel_size: 13, sigma: 3.0}
  gaussian_noise:
    levels:
      1: {sigma: 8.0}
      2: {sigma: 16.0}
      3: {sigma: 28.0}
  jpeg_compression:
    levels:
      1: {quality: 70}
      2: {quality: 40}
      3: {quality: 15}
  fog:
    levels:
      1: {alpha: 0.15}
      2: {alpha: 0.30}
      3: {alpha: 0.45}
