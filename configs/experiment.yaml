# Reproducibility
seed: 42

# Dataset paths must point to the extracted Cityscapes directories.
data:
  root: data/cityscapes
  train_images: leftImg8bit/train
  train_masks: gtFine/train
  official_val_images: leftImg8bit/val
  official_val_masks: gtFine/val
  split_file: data/splits/split_manifest.csv
  internal_val_size: 0.2
  num_classes: 19
  ignore_index: 255
  image_width: 384
  image_height: 192

models:
  names:
    - unet
    - deeplabv3plus
    - pspnet
  encoder: resnet34
  encoder_weights: imagenet

training:
  epochs: 8
  batch_size: 8
  num_workers: 2
  log_interval: 25
  learning_rate: 0.0003
  weight_decay: 0.0001
  device: auto
  mixed_precision: true
  checkpoint_dir: checkpoints
  history_dir: outputs/metrics

evaluation:
  batch_size: 8
  save_predictions: true
  metrics_dir: outputs/metrics
  figures_dir: outputs/figures
  predictions_dir: outputs/predictions

robust_training:
  enabled: true
  selection_file: outputs/metrics/robustness_summary.csv
  seen_corruptions:
    - darkness
    - contrast
    - gaussian_blur
    - gaussian_noise
    - jpeg
  unseen_corruptions:
    - motion_blur
    - impulse_noise
    - fog
  augmentation:
    horizontal_flip_probability: 0.5
    brightness_contrast_probability: 0.3
    brightness_factor_range: [0.80, 1.20]
    contrast_factor_range: [0.80, 1.20]
    heavy_corruption_probability: 0.3
    gaussian_blur_kernel_sizes: [3, 5, 7]
    gaussian_blur_sigma_range: [0.5, 1.5]
    gaussian_noise_sigma_range: [4.0, 12.0]
    jpeg_quality_range: [60, 90]

tracking:
  # Set MLFLOW_TRACKING_URI in the environment when a custom URI is needed.
  experiment_name: cityscapes_robustness
